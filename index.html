<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDO Barter Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{
    --bg:#0e1218; --bg2:#161b24; --bg3:#1f2632; --bd:#2b3340;
    --tx:#e6e8ec; --tx2:#9aa3b2; --ac:#f6c544; --ac2:#e7a82a;
    --t1:#e6e8ec; --t2:#4caf6f; --t3:#3aa3d9; --t4:#e0c44a; --t5:#e0884a; --t6:#e64a5b; --t7:#f6c544;
    --mat:#6c7a89; --esp:#b08bff; --cox:#d96d6d;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Segoe UI,Roboto,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#11161fee,#11161fcc);backdrop-filter:blur(6px);border-bottom:1px solid var(--bd);padding:14px 20px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  h1{margin:0;font-size:18px;font-weight:600;letter-spacing:.3px;color:var(--ac)}
  h1 span{color:var(--tx2);font-weight:400;font-size:13px;margin-left:8px}
  input,button,select{font:inherit;color:var(--tx);background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;outline:none}
  input:focus,select:focus{border-color:var(--ac)}
  button{cursor:pointer;transition:background .15s,border-color .15s}
  button:hover{background:var(--bg3);border-color:var(--ac)}
  .search{flex:1;min-width:200px;max-width:380px}
  .stat{font-size:13px;color:var(--tx2)}
  .stat b{color:var(--tx);font-weight:600}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .chip{padding:5px 12px;border-radius:999px;border:1px solid var(--bd);background:var(--bg2);font-size:13px;cursor:pointer;user-select:none}
  .chip:hover{border-color:var(--ac)}
  .chip.on{background:var(--ac);color:#1a1300;border-color:var(--ac);font-weight:600}
  .chip .n{opacity:.6;margin-left:6px;font-size:11px}
  main{padding:18px 20px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .card{background:var(--bg2);border:1px solid var(--bd);border-left:5px solid #566273;border-radius:8px;padding:8px;display:grid;grid-template-columns:48px 1fr;grid-template-rows:auto auto;column-gap:8px;row-gap:4px;align-items:start;min-height:96px;transition:filter .15s}
  .card:hover{filter:brightness(1.12)}
  .card.t-T1{background:linear-gradient(180deg,#262b35,#171a22)}
  .card.t-T2{background:linear-gradient(180deg,#1a2e22,#10201a)}
  .card.t-T3{background:linear-gradient(180deg,#15263a,#0f1a28)}
  .card.t-T4{background:linear-gradient(180deg,#332b14,#1f1a0e)}
  .card.t-T5{background:linear-gradient(180deg,#33231a,#1f160f)}
  .card.t-T6{background:linear-gradient(180deg,#3a1820,#22101a)}
  .card.t-T7{background:linear-gradient(180deg,#3a2e10,#1f1908)}
  .card.t-Material,.card.t-Especial,.card.t-Cox{background:linear-gradient(180deg,#1d222b,#13171e)}
  .card.stock-zero,.card.stock-low{border-left-color:#c4424c}
  .card.stock-mid{border-left-color:#d9a440}
  .card.stock-ok{border-left-color:#4caf6f}
  .stock-tag{position:absolute;font-size:9px;font-weight:700;letter-spacing:.5px;padding:1px 5px;border-radius:3px;color:#fff;text-transform:uppercase;line-height:1.4}
  .card{position:relative}
  .card .stock-tag{top:6px;right:6px}
  .st-zero{background:#c4424c}
  .st-low{background:#c4424c}
  .st-mid{background:#d9a440;color:#221a00}
  .st-ok{background:#4caf6f}
  .icon{grid-row:1 / span 2;width:48px;height:48px;border-radius:6px;background:#0a0d12;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .icon img{max-width:100%;max-height:100%}
  .name{font-size:12.5px;line-height:1.25;color:var(--tx);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px}
  .name a{color:inherit;text-decoration:none}
  .name a:hover{filter:brightness(1.25)}
  .name.t-T1 a{color:var(--t1)} .name.t-T2 a{color:var(--t2)} .name.t-T3 a{color:var(--t3)}
  .name.t-T4 a{color:var(--t4)} .name.t-T5 a{color:var(--t5)} .name.t-T6 a{color:var(--t6)} .name.t-T7 a{color:var(--t7)}
  .name.t-Material a{color:var(--mat)} .name.t-Especial a{color:var(--esp)} .name.t-Cox a{color:var(--cox)}
  .badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;letter-spacing:.4px;margin-right:4px;vertical-align:middle}
  .b-T1{background:var(--t1)} .b-T2{background:var(--t2)} .b-T3{background:var(--t3)} .b-T4{background:var(--t4)} .b-T5{background:var(--t5)} .b-T6{background:var(--t6)} .b-T7{background:var(--t7);color:#222}
  .b-Material{background:var(--mat)} .b-Especial{background:var(--esp)} .b-Cox{background:var(--cox)}
  .qty{display:flex;align-items:center;gap:2px;flex-wrap:nowrap;min-width:0}
  .qty button{padding:2px 0;font-size:11px;line-height:1;height:24px;flex:1 1 0;min-width:0}
  .qty input{flex:1 1 0;min-width:0;width:0;height:24px;text-align:center;padding:0 2px;font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;-moz-appearance:textfield}
  .qty input::-webkit-outer-spin-button,.qty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .qty input.has{color:var(--ac);background:#1a1a0a}
  .toolbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:8px;font-size:12px;color:var(--tx2)}
  .toolbar label{display:flex;align-items:center;gap:6px}
  .toolbar select{padding:4px 8px;font-size:12px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .dot-low{background:#c4424c} .dot-mid{background:#d9a440} .dot-ok{background:#4caf6f} .dot-zero{background:#566273}
  .empty{text-align:center;color:var(--tx2);padding:40px;font-size:14px}
  footer{position:fixed;bottom:0;left:0;right:0;background:#0e1218ee;backdrop-filter:blur(6px);border-top:1px solid var(--bd);padding:8px 20px;font-size:12px;color:var(--tx2);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  footer .src{font-size:11px;opacity:.7}
  .lang{display:flex;border:1px solid var(--bd);border-radius:6px;overflow:hidden}
  .lang button{border:0;border-radius:0;padding:6px 10px;font-size:12px;font-weight:600;background:var(--bg2)}
  .lang button.on{background:var(--ac);color:#1a1300}
  .lang button+button{border-left:1px solid var(--bd)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#3a4250}
</style>
</head>
<body>
<header>
  <div class="row">
    <h1 id="app-title">BDO Barter Tracker</h1>
    <input class="search" id="search" autocomplete="off">
    <div class="stat" id="stats"></div>
    <button id="btn-export"></button>
    <button id="btn-import"></button>
    <button id="btn-clear"></button>
    <div class="lang">
      <button data-lang="pt">PT</button>
      <button data-lang="en">EN</button>
    </div>
    <input type="file" id="file-import" accept=".json" hidden>
  </div>
  <div class="chips" id="chips"></div>
  <div class="toolbar">
    <label id="lbl-stock"><span></span>
      <select id="sel-stock"></select>
    </label>
    <label id="lbl-sort"><span></span>
      <select id="sel-sort"></select>
    </label>
    <span id="legend"></span>
  </div>
</header>
<main>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">Nenhum item encontrado.</div>
</main>
<footer>
  <span id="foot-info"></span>
  <span class="src" id="foot-src"></span>
</footer>

      title:'Barter Stock — Black Desert Online',
      search:'Search item...',
      stats:(i,t)=>`<b>${i}</b> items · <b>${t}</b> in stock`,
      export:'Export', import:'Import', clear:'Clear all',
      exportTitle:'Download stock JSON', importTitle:'Load stock JSON', clearTitle:'Reset all quantities',
      all:'All', stock:'Stock:', sort:'Sort:',
      stockOpts:{all:'All',ok:'Sufficient (40+)',mid:'Low (11–39)',low:'Insufficient (1–10)',zero:'Empty (0)',any:'In stock (≥1)'},
      sortOpts:{default:'Default (tier, name)','qty-desc':'Quantity ↓','qty-asc':'Quantity ↑',name:'Name (A–Z)'},
      legend:'<span class="dot dot-ok"></span>Sufficient <span class="dot dot-mid"></span>Low <span class="dot dot-low"></span>Insufficient',
      empty:'No items found.',
      footInfo:'Data is stored in your browser (localStorage). Use Export/Import to back it up.',
      footSrc:'Data & icons: bdocodex.com',
      cats:{T1:'T1',T2:'T2',T3:'T3',T4:'T4',T5:'T5',T6:'T6',T7:'T7',Material:'Materials',Especial:'Special',Cox:'Cox'},
      confirmReplace:'Replace current stock with the imported file?',
      confirmClear:'Reset all quantities?',
      importFail:'Import failed: ',
      invalidFormat:'invalid format'
    }
  };

  let lang = localStorage.getItem(LANG_KEY) || 'pt';
  if(!I18N[lang]) lang = 'pt';
  const T = ()=> I18N[lang];

  let qtd = loadQtd();
  let state = Object.assign({cat:'__all__', q:'', stock:'all', sort:'default'}, JSON.parse(localStorage.getItem(FILTER_KEY)||'{}'));
  // back-compat: filtros antigos usavam 'Todos'
  if(state.cat==='Todos') state.cat='__all__';

  function itemName(i){ return (lang==='en' && i.name_en) ? i.name_en : i.name; }

  function stockLevel(q){ if(!q) return 'zero'; if(q<=10) return 'low'; if(q<=39) return 'mid'; return 'ok'; }

  function loadQtd(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch{ return {}; }
  }
  function saveQtd(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(qtd)); }
  function saveFilter(){ localStorage.setItem(FILTER_KEY, JSON.stringify(state)); }

  function normalize(s){ return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

  function buildChips(){
    const counts = {__all__: ITEMS.length};
    ITEMS.forEach(i => counts[i.cat] = (counts[i.cat]||0)+1);
    const cats = ['__all__', ...CAT_ORDER.filter(c=>counts[c])];
    const labels = T().cats;
    const html = cats.map(c=>{
      const on = c===state.cat ? ' on' : '';
      const lbl = c==='__all__' ? T().all : (labels[c]||c);
      return `<div class="chip${on}" data-cat="${c}">${lbl}<span class="n">${counts[c]||0}</span></div>`;
    }).join('');
    const chips = document.getElementById('chips');
    chips.innerHTML = html;
    chips.querySelectorAll('.chip').forEach(el=>{
      el.addEventListener('click',()=>{ state.cat = el.dataset.cat; saveFilter(); buildChips(); render(); });
    });
  }

  function filtered(){
    const q = normalize(state.q.trim());
    const loc = lang==='en' ? 'en' : 'pt-BR';
    const list = ITEMS.filter(i=>{
      if(state.cat!=='__all__' && i.cat!==state.cat) return false;
      if(q && !normalize(itemName(i)).includes(q) && !normalize(i.name).includes(q) && (!i.name_en || !normalize(i.name_en).includes(q))) return false;
      const lvl = stockLevel(qtd[i.id]||0);
      if(state.stock==='any' && lvl==='zero') return false;
      else if(['ok','mid','low','zero'].includes(state.stock) && lvl!==state.stock) return false;
      return true;
    });
    const byCatName = (a,b)=>{
      const ca = CAT_ORDER.indexOf(a.cat), cb = CAT_ORDER.indexOf(b.cat);
      if(ca!==cb) return ca-cb;
      return itemName(a).localeCompare(itemName(b),loc);
    };
    if(state.sort==='qty-desc') list.sort((a,b)=>((qtd[b.id]||0)-(qtd[a.id]||0))||byCatName(a,b));
    else if(state.sort==='qty-asc') list.sort((a,b)=>((qtd[a.id]||0)-(qtd[b.id]||0))||byCatName(a,b));
    else if(state.sort==='name') list.sort((a,b)=>itemName(a).localeCompare(itemName(b),loc));
    else list.sort(byCatName);
    return list;
  }

  function render(){
    const list = filtered();
    const grid = document.getElementById('grid');
    grid.innerHTML = list.map(i=>{
      const q = qtd[i.id]||0;
      const lvl = stockLevel(q);
      const urlLang = lang==='en' ? 'us' : 'pt';
      const nm = itemName(i);
      const safeNm = nm.replace(/"/g,'&quot;');
      return `<div class="card t-${i.cat} stock-${lvl}" data-id="${i.id}">
        <div class="icon"><a href="https://bdocodex.com/${urlLang}/item/${i.id}/" target="_blank" rel="noopener"><img src="${i.icon}" alt="" loading="lazy"></a></div>
        <div class="name t-${i.cat}"><span class="badge b-${i.cat}">${i.cat}</span><a href="https://bdocodex.com/${urlLang}/item/${i.id}/" target="_blank" rel="noopener" title="${safeNm}">${nm}</a></div>
        <div class="qty">
          <button data-d="-10" title="-10">−10</button>
          <button data-d="-1">−</button>
          <input type="number" min="0" step="1" value="${q}" class="${q>0?'has':''}">
          <button data-d="1">+</button>
          <button data-d="10" title="+10">+10</button>
        </div>
      </div>`;
    }).join('');
    document.getElementById('empty').style.display = list.length?'none':'block';
    updateStats();

    grid.querySelectorAll('.card').forEach(card=>{
      const id = +card.dataset.id;
      const input = card.querySelector('input');
      card.querySelectorAll('button[data-d]').forEach(b=>{
        b.addEventListener('click',()=>{ change(id, +b.dataset.d, input, card); maybeReRender(); });
      });
      input.addEventListener('input',()=>{ setQty(id, parseInt(input.value)||0, input, card); scheduleReRender(); });
      input.addEventListener('blur',()=>{ maybeReRender(); });
      input.addEventListener('focus',()=>input.select());
    });
  }

  function change(id, delta, input, card){
    const cur = qtd[id]||0;
    setQty(id, Math.max(0, cur+delta), input, card);
  }
  function setQty(id, v, input, card){
    v = Math.max(0, v|0);
    if(v===0){ delete qtd[id]; } else { qtd[id]=v; }
    if(document.activeElement!==input) input.value = v;
    input.classList.toggle('has', v>0);
    card.classList.remove('stock-zero','stock-low','stock-mid','stock-ok');
    card.classList.add('stock-'+stockLevel(v));
    saveQtd();
    updateStats();
  }
  function maybeReRender(){
    if(state.stock!=='all' || state.sort.startsWith('qty')) render();
  }
  let inputDt;
  function scheduleReRender(){
    clearTimeout(inputDt);
    inputDt = setTimeout(maybeReRender, 600);
  }

  function updateStats(){
    const total = Object.values(qtd).reduce((a,b)=>a+b,0);
    const items = Object.keys(qtd).length;
    const loc = lang==='en' ? 'en-US' : 'pt-BR';
    document.getElementById('stats').innerHTML = T().stats(items.toLocaleString(loc), total.toLocaleString(loc));
  }

  // Filtro de estoque + ordenação
  const stockSel = document.getElementById('sel-stock');
  const sortSel = document.getElementById('sel-sort');
  stockSel.value = state.stock;
  sortSel.value = state.sort;
  stockSel.addEventListener('change',()=>{ state.stock = stockSel.value; saveFilter(); render(); });
  sortSel.addEventListener('change',()=>{ state.sort = sortSel.value; saveFilter(); render(); });

  // Busca
  const searchEl = document.getElementById('search');
  searchEl.value = state.q;
  let dt; searchEl.addEventListener('input',()=>{ clearTimeout(dt); dt=setTimeout(()=>{ state.q = searchEl.value; saveFilter(); render(); },120); });

  // Exportar
  document.getElementById('btn-export').addEventListener('click',()=>{
    const data = { exportedAt: new Date().toISOString(), qtd };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bdo-estoque-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });

  // Importar
  const fileInput = document.getElementById('file-import');
  document.getElementById('btn-import').addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change', async ()=>{
    const f = fileInput.files[0]; if(!f) return;
    try{
      const data = JSON.parse(await f.text());
      const newQtd = data.qtd || data;
      if(typeof newQtd !== 'object') throw new Error(T().invalidFormat);
      if(!confirm(T().confirmReplace)) return;
      qtd = {}; Object.entries(newQtd).forEach(([k,v])=>{ const n=parseInt(v)||0; if(n>0) qtd[k]=n; });
      saveQtd(); render();
    }catch(e){ alert(T().importFail+e.message); }
    fileInput.value = '';
  });

  // Zerar
  document.getElementById('btn-clear').addEventListener('click',()=>{
    if(!Object.keys(qtd).length) return;
    if(!confirm(T().confirmClear)) return;
    qtd = {}; saveQtd(); render();
  });

  function applyI18n(){
    const t = T();
    document.documentElement.lang = lang==='en' ? 'en' : 'pt-BR';
    document.title = t.title;
    document.getElementById('app-title').textContent = t.title;
    const s = document.getElementById('search'); s.placeholder = t.search;
    const ex = document.getElementById('btn-export'); ex.textContent = t.export; ex.title = t.exportTitle;
    const im = document.getElementById('btn-import'); im.textContent = t.import; im.title = t.importTitle;
    const cl = document.getElementById('btn-clear'); cl.textContent = t.clear; cl.title = t.clearTitle;
    document.querySelector('#lbl-stock > span').textContent = t.stock;
    document.querySelector('#lbl-sort > span').textContent = t.sort;
    const ss = document.getElementById('sel-stock');
    ss.innerHTML = Object.entries(t.stockOpts).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
    ss.value = state.stock;
    const so = document.getElementById('sel-sort');
    so.innerHTML = Object.entries(t.sortOpts).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
    so.value = state.sort;
    document.getElementById('legend').innerHTML = t.legend;
    document.getElementById('empty').textContent = t.empty;
    document.getElementById('foot-info').textContent = t.footInfo;
    document.getElementById('foot-src').textContent = t.footSrc;
    document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on', b.dataset.lang===lang));
  }

  document.querySelectorAll('.lang button').forEach(b=>{
    b.addEventListener('click',()=>{
      lang = b.dataset.lang;
      localStorage.setItem(LANG_KEY, lang);
      applyI18n();
      buildChips();
      render();
    });
  });

  applyI18n();
  buildChips();
  render();
})();
</script>
</body>
</html>
